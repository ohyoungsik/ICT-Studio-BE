name: BE Docker Manual Build and Push

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag
        required: true
        default: latest

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: docker build -t ohyoungsik/ict-studio-be:${{ github.event.inputs.image_tag }} .

      - name: Push Image
        run: docker push ohyoungsik/ict-studio-be:${{ github.event.inputs.image_tag }}
